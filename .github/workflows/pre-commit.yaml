name: pre-commit
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: setup python
      uses: actions/setup-python@v6
      with:
        python-version: '3.14'
    - name: run pre-commit
      uses: pre-commit/action@v3.0.1
