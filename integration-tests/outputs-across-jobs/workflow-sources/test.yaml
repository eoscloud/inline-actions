name: outputs-across-jobs-test
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.build.outputs.url }}
      checksum: ${{ steps.build.outputs.checksum }}
    steps:
      - uses: actions/checkout@v6
      - name: build
        id: build
        uses: ./actions/producer
        with:
          version: "2.0.0"
  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v6
      - name: deploy
        uses: ./actions/consumer
        with:
          artifact_url: ${{ needs.build.outputs.url }}
          checksum: ${{ needs.build.outputs.checksum }}
