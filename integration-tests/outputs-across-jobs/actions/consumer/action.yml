name: consumer
description: Deploys an artifact using inputs passed from another job
inputs:
  artifact_url:
    description: URL of the artifact to deploy
    required: true
  checksum:
    description: Expected checksum
    required: true
runs:
  using: composite
  steps:
    - name: download artifact
      shell: bash
      run: echo "Downloading from ${{ inputs.artifact_url }}"
    - name: verify checksum
      shell: bash
      run: echo "Verifying checksum ${{ inputs.checksum }}"
